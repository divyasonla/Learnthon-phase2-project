<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoVerse Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="container">
        <h1 class="logo">PhotoVerse</h1>

        <nav class="navbar">
            <a href="#All">All</a>
            <a href="#nature">Nature</a>
            <a href="#animals">Animals</a>
            <a href="#travel">Travel</a>
            <a href="#food">Food</a>
            <a href="#technology">Technology</a>
        </nav>
    </div>
</header>

<section class="hero">
    <h2>Explore Beautiful Moments</h2>
    <p>Modern responsive gallery for hackathon project</p>
</section>

<section class="gallery container" id="All">
    <div id="nature">

    
        <div class="card">
            <img src="https://img.freepik.com/free-photo/beautiful-lake-mountains_395237-44.jpg?semt=ais_hybrid&w=740&q=80">
            <div class="overlay">Nature</div>
        </div>
    
        <div class="card">
            <img src="https://cdn.pixabay.com/photo/2018/01/14/23/12/nature-3082832_1280.jpg">
            <div class="overlay">Nature</div>
        </div>
    
        <div class="card">
            <img src="https://thumbs.dreamstime.com/b/environment-earth-day-hands-trees-growing-seedlings-bokeh-green-background-female-hand-holding-tree-nature-field-gra-130247647.jpg">
            <div class="overlay">Nature</div>
        </div>
    </div>
    <div id="animals">
        <div class="card">
            <img src="https://cdn.pixabay.com/photo/2020/03/10/04/48/animal-4917802_640.jpg">
            <div class="overlay">Animals</div>
        </div>
    
        <div class="card">
            <img src="https://t3.ftcdn.net/jpg/05/71/07/60/360_F_571076076_S98Bu0ydnKNFgRWWuFQmtEUdH29zk1nE.jpg">
            <div class="overlay">Animals</div>
        </div>
    
        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREDPp1-pC4zFRX8GlRdQBv2dJhbsohFlHMgA&s">
            <div class="overlay">Animals</div>
        </div>
    </div>
    <div id="travel">

    
        <div class="card">
            <img src="https://t3.ftcdn.net/jpg/07/80/95/16/360_F_780951672_cJzVeOxybkHkCkFDIOGUAlcq2ADIHVO7.jpg">
            <div class="overlay">Travel</div>
        </div>
    
        <div class="card">
            <img src="https://sushmatravels.com/wp-content/uploads/2025/09/WhatsApp-Image-2025-09-14-at-11.28.51-AM-768x1024.jpeg">
            <div class="overlay"> Travel</div>
        </div>
    
        <div class="card">
            <img src="https://content.jdmagicbox.com/comp/varkala/f3/0471px471.x471.221119212335.m5f3/catalogue/buddies-travels-varkala-helipad-road-varkala-travel-agents-yqbfjldrta.jpg">
            <div class="overlay">Travel</div>
        </div>
    </div>
    <div id="food">
        <div class="card">
            <img src="https://t4.ftcdn.net/jpg/03/14/36/33/360_F_314363347_jiMEfkFWHqJ9J5r3IjihtTlvyf7ECYpl.jpg">
            <div class="overlay">Food</div>
        </div>
    
        <div class="card">
            <img src="https://t3.ftcdn.net/jpg/02/60/12/88/360_F_260128861_Q2ttKHoVw2VrmvItxyCVBnEyM1852MoJ.jpg">
            <div class="overlay">Food</div>
        </div>
    
        <div class="card">
            <img src="https://media.istockphoto.com/id/1457433817/photo/group-of-healthy-food-for-flexitarian-diet.jpg?s=612x612&w=0&k=20&c=v48RE0ZNWpMZOlSp13KdF1yFDmidorO2pZTu2Idmd3M=">
            <div class="overlay">Food</div>
        </div>
    </div>
    <div id="technology">
        <div class="card">
            <img src="https://res.cloudinary.com/jerrick/image/upload/v1737648971/67926b4ba108d3001d27ac03.jpg">
            <div class="overlay">Technology</div>
        </div>
    
        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSxBztn2GFD74q18AFwc39W1SExTR3jTO02fQ&s">
            <div class="overlay">Technology</div>
        </div>
    
        <div class="card">
            <img src="https://s7ap1.scene7.com/is/image/TCSCOMprod/Hitech-Web-3840x1512-1:Small?wid=1278&hei=1512&dpr=off">
            <div class="overlay">Technology</div>
        </div>
    </div>
</section>

<footer>
    <p>Created for Hackathon Project 🚀</p>
</footer>

</body>
</html>
